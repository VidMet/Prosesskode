        let currentAPI;

        async function init() {
            currentAPI = await window.TrimbleConnectWorkspace.connect(window.parent);

        document.getElementById('scanBtn').addEventListener('click', async () => {
            const resultatDiv = document.getElementById('resultat');

            } catch (error) {
                console.error("Kritisk feil under skanning:", error);
                resultatDiv.innerText = `Skanning feilet: ${error.message}. Sjekk Console (F12) for detaljer.`;
            }
        });

        function tegnOppUI(register) {
            const container = document.getElementById('resultat');
            container.innerHTML = '';

            for (let kode in register) {
                const data = register[kode];
                
                const div = document.createElement('div');
                div.className = 'prosess-gruppe';
                
                // Header (Klikkbar for å velge i 3D)
                const header = document.createElement('div');
                header.className = 'prosess-header';
                header.innerText = `${kode} - ${data.beskrivelse} (${data.objekter.length} objekter) | Total: ${data.totalMengde.toFixed(2)}`;
                
                // Valg av objekter i 3D-viewer ved klikk
                header.onclick = () => {
                    currentAPI.viewer.setSelection(data.objektIds);
                };

                // Liste med enkeltoobjekter
                const liste = document.createElement('div');
                liste.className = 'objekt-liste';
                liste.style.display = 'block'; // Kan gjøres toggle-bar
                
                data.objekter.forEach(obj => {
                    const item = document.createElement('div');
                    item.className = 'objekt-item';
                    item.innerHTML = `<span>Objekt ID: ${obj.id}</span> <span>${obj.mengde.toFixed(2)}</span>`;
                    liste.appendChild(item);
                });

                div.appendChild(header);
                div.appendChild(liste);
                container.appendChild(div);
            }
        }
