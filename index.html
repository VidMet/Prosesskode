<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <title>Prosesskoder og Mengder</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; color: #333; }
        .btn { padding: 8px 16px; background: #005A9C; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin: 10px 0; font-size: 14px; font-style: italic; color: #666; }
        
        .prosess-kort { background: white; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 6px; overflow: hidden; }
        .prosess-header { padding: 12px 16px; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .prosess-header:hover { background: #f9f9f9; }
        .prosess-tittel { font-weight: bold; font-size: 16px; color: #005A9C; }
        .prosess-mengde { font-weight: bold; background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        
        .objekt-liste { display: none; padding: 10px 16px; background: #fafafa; border-top: 1px solid #eee; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .objekt-rad { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eaeaea; }
    </style>
</head>
<body>

    <h2>SVV Prosesskoder i Modell</h2>
    <button id="scanBtn" class="btn" disabled>Laster API...</button>
    <div id="status">Venter på Trimble Connect...</div>
    <div id="resultat"></div>

    <script>
        let API = null;
        let svvHandbok = null;

        const $ = id => document.getElementById(id);
        const setStatus = msg => $('status').innerText = msg;

        // 1. KOBLE TIL API SIKKERT
        async function connect(){
            try {
                API = await window.TrimbleConnectWorkspace.connect(window.parent);
                
                // Etter vi er koblet til, forsøker vi å hente JSON-filen
                await lastJSONFil();

                $('scanBtn').disabled = false;
                $('scanBtn').innerText = "Skann modell for mengder";
            } catch(e) { 
                setStatus('❌ Kunne ikke koble til API.'); 
                console.error(e);
            }
        }

        // 2. HENT JSON-FIL (Prosesskode.json)
        async function lastJSONFil() {
            setStatus('⏳ Laster inn Prosesskode.json...');
            try {
                // Her antar vi at filen ligger i samme mappe/server som utvidelsen
                // Legger til en nocache-parameter (timestamp) for å sikre at vi alltid har ferskeste versjon
                const url = 'Prosesskode.json?nocache=' + new Date().getTime(); 
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`Nettverksfeil: ${response.status} ${response.statusText}`);
                }
                
                svvHandbok = await response.json();
                setStatus('✅ Tilkoblet og Prosesskoder lastet inn.');
            } catch (error) {
                console.error("Feil ved lasting av JSON:", error);
                setStatus('⚠️ Kunne ikke laste Prosesskode.json. Skanning vil vise "Ukjent prosess".');
                // Vi oppretter en tom fallback slik at koden ikke krasjer senere
                svvHandbok = { prosesskoder: {} };
            }
        }

        // 3. SKANN LOGIKKEN
        $('scanBtn').addEventListener('click', async () => {
            if (!API) return;
            $('scanBtn').disabled = true;
            $('resultat').innerHTML = '';
            
            try {
                setStatus('⏳ Henter modeller fra vieweren...');
                const models = await API.viewer.getObjects();
                
                if (!models || models.length === 0) {
                    setStatus('⚠️ Fant ingen objekter i vieweren.');
                    $('scanBtn').disabled = false;
                    return;
                }

                let prosessRegister = {};
                const CHUNK = 200;

                for (const model of models) {
                    const mid = model.modelId || model.modelid;
                    const objectIds = (model.objects || []).map(o => o.id || o.objectRuntimeId).filter(id => id != null);
                    
                    for (let i = 0; i < objectIds.length; i += CHUNK) {
                        const chunk = objectIds.slice(i, i + CHUNK);
                        setStatus(`⏳ Skanner egenskaper... Behandler modell ${mid} (${i} av ${objectIds.length})`);
                        
                        const propsArr = await API.viewer.getObjectProperties(mid, chunk);
                        
                        propsArr.forEach(obj => {
                            const flatProps = {};
                            (obj.properties || []).forEach(pset => 
                                (pset.properties || []).forEach(p => flatProps[p.name] = p.value)
                            );
                            
                            const prosesskode = flatProps["Prosesskode"];
                            const mengde = parseFloat(flatProps["NetVolume"]) || 0; 
                            
                            if (prosesskode && prosesskode.trim() !== "") {
                                if (!prosessRegister[prosesskode]) {
                                    // Sjekk om koden finnes i JSON-filen
                                    const handbokData = (svvHandbok && svvHandbok.prosesskoder) 
                                        ? svvHandbok.prosesskoder[prosesskode] 
                                        : null;

                                    prosessRegister[prosesskode] = {
                                        tittel: handbokData && handbokData.tittel ? handbokData.tittel : "Ukjent prosesskode",
                                        enhet: handbokData && handbokData.enhet ? handbokData.enhet : "?",
                                        totalMengde: 0,
                                        objekterForMarkering: [], 
                                        objekter: []
                                    };
                                }
                                
                                prosessRegister[prosesskode].totalMengde += mengde;
                                prosessRegister[prosesskode].objekterForMarkering.push({
                                    modelId: mid, 
                                    objectRuntimeIds: [obj.id || obj.objectRuntimeId]
                                });
                                prosessRegister[prosesskode].objekter.push({ 
                                    navn: obj.name || 'Ukjent', 
                                    mengde: mengde 
                                });
                            }
                        });
                    }
                }

                tegnOppUI(prosessRegister);
                setStatus('✅ Skanning fullført!');
                $('scanBtn').disabled = false;

            } catch (error) {
                console.error("Kritisk feil under skanning:", error);
                setStatus(`❌ Feil: ${error.message}`);
                $('scanBtn').disabled = false;
            }
        });

        // 4. TEGN OPP RESULTATET (Uendret fra forrige versjon)
        function tegnOppUI(register) {
            const container = $('resultat');
            const koder = Object.keys(register).sort();
            
            if (koder.length === 0) {
                container.innerHTML = '<p>Fant ingen objekter med egenskapen "Prosesskode".</p>';
                return;
            }

            koder.forEach(kode => {
                const data = register[kode];
                
                const div = document.createElement('div');
                div.className = 'prosess-kort';
                
                const header = document.createElement('div');
                header.className = 'prosess-header';
                
                const tittelDiv = document.createElement('div');
                tittelDiv.className = 'prosess-tittel';
                tittelDiv.innerText = `${kode} - ${data.tittel}`;
                
                const mengdeDiv = document.createElement('div');
                mengdeDiv.className = 'prosess-mengde';
                mengdeDiv.innerText = `${data.totalMengde.toFixed(2)} ${data.enhet} (${data.objekter.length} obj)`;
                
                header.appendChild(tittelDiv);
                header.appendChild(mengdeDiv);
                
                const liste = document.createElement('div');
                liste.className = 'objekt-liste';
                
                data.objekter.forEach(obj => {
                    const rad = document.createElement('div');
                    rad.className = 'objekt-rad';
                    rad.innerHTML = `<span>${obj.navn}</span> <span>${obj.mengde.toFixed(2)} ${data.enhet}</span>`;
                    liste.appendChild(rad);
                });

                header.onclick = async () => {
                    liste.style.display = liste.style.display === 'block' ? 'none' : 'block';
                    try {
                        if (API.viewer.setSelection) {
                            await API.viewer.setSelection({ modelObjectIds: data.objekterForMarkering }, 'set');
                        }
                    } catch(e) { console.error("Kunne ikke markere objekter", e); }
                };

                div.appendChild(header);
                div.appendChild(liste);
                container.appendChild(div);
            });
        }

        connect();
    </script>
</body>
</html>
