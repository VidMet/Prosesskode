<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8"/>
  <title>Prosesskoder og Mengder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1f2937;
      --border:    #30363d;
      --ink:       #e6edf3;
      --muted:     #7d8590;
      --green:     #3fb950;
      --green-dim: #1a3a22;
      --yellow:    #d29922;
      --red:       #f85149;
      --red-dim:   #3a1212;
      --blue:      #58a6ff;
      --blue-dim:  #0d2044;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg); color: var(--ink); font-family: var(--sans);
      min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
      min-width: 380px; /* Sørger for at UI-et føles romslig som default */
    }

    /* flex-wrap tillater elementer å bryte linje ved smale vinduer */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; 
    }

    .header-title { flex: 1; min-width: 200px; }
    .header-title h1 { font-size: 16px; font-weight: 800; letter-spacing: -.3px; color: var(--ink); }
    .header-title p { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }

    .badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }

    .btn { font-family: var(--sans); font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; transition: opacity .15s, transform .1s; white-space: nowrap; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: .85; }
    .btn:not(:disabled):active { transform: scale(.97); }
    .btn-primary { background: var(--blue); color: #000; }
    
    #statusBar { font-family: var(--mono); font-size: 11px; padding: 6px 16px; background: var(--blue-dim); color: var(--blue); border-bottom: 1px solid #1a3a5c; flex-shrink: 0; }
    #statusBar.ok    { background: var(--green-dim); color: var(--green); border-color: #1a3a22; }
    #statusBar.error { background: var(--red-dim);   color: var(--red);   border-color: #3a1212; }
    #statusBar.warn  { background: #3a2d05; color: var(--yellow); border-color: #5c4708; }

    main { flex: 1; overflow-y: auto; padding: 16px; }

    .prosess-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .prosess-header { padding: 12px 16px; background: var(--surface); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
    .prosess-header:hover { background: var(--surface2); }
    
    .prosess-tittel { font-weight: 700; font-size: 14px; color: var(--blue); }
    .prosess-mengde { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--bg); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); }
    
    /* Kroppen skroller ikke lenger i seg selv */
    .panel-kropp { display: none; border-top: 1px solid var(--border); background: var(--bg); flex-direction: column; }
    
    .prosess-beskrivelse { padding: 16px; border-bottom: 1px solid #1c2128; background: #0d1117; flex-shrink: 0; }
    .tekst-blokk { margin-bottom: 10px; font-size: 12px; line-height: 1.5; color: #c9d1d9; border-left: 3px solid var(--surface2); padding-left: 10px; }
    .tekst-blokk:last-child { margin-bottom: 0; }
    .tekst-bokstav { font-weight: 700; color: var(--blue); display: block; margin-bottom: 2px; font-size: 11px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* Ny layout for "Delmengder"-seksjonen */
    .delmengder-seksjon { display: flex; flex-direction: column; padding-top: 12px; }
    .delmengder-tittel { font-weight: 700; color: var(--blue); font-size: 11px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 16px 8px 16px; }
    
    /* Nå er det kun objektlisten som er skrollbar */
    .objekt-liste { overflow-y: auto; max-height: 250px; border-top: 1px solid #1c2128; }
    
    .objekt-rad { display: flex; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .objekt-rad:hover { background: var(--surface2); }
    
    .obj-navn { font-size: 12px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
    .obj-mengde { font-family: var(--mono); font-size: 11px; color: var(--green); }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:none; }
    }
    .anim { animation: fadeUp .3s ease both; }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Mengdeuttak R761</h1>
    <p>Interaktivt oppslag mot SVV Prosesskoder</p>
  </div>
  <span class="badge" id="modelBadge">Frakoblet</span>
  <button class="btn btn-primary" id="scanBtn" disabled>▶ Skann Modell</button>
</header>

<div id="statusBar">Kobler til Trimble Connect...</div>

<main id="mainContent">
  <div class="empty anim">Trykk <strong>Skann Modell</strong> for å hente ut mengder.</div>
</main>

<script>
let API = null;
let svvHandbok = null;

const tekstKoder = {
  "a": "a) Omfang",
  "b": "b) Materialer",
  "c": "c) Utførelse",
  "d": "d) Toleranser",
  "e": "e) Prøving, kontroll",
  "x": "x) Mengderegler"
};

const $ = id => document.getElementById(id);
const setStatus = (m, c='') => { $('statusBar').textContent = m; $('statusBar').className = c; };

async function connect(){
  try {
    API = await window.TrimbleConnectWorkspace.connect(window.parent);
    await lastJSONFil();
    $('scanBtn').disabled = false;
    $('modelBadge').textContent = 'Tilkoblet';
  } catch(e) { 
    setStatus('❌ Kunne ikke koble til API.', 'error'); 
  }
}

async function lastJSONFil() {
  setStatus('⏳ Laster inn Prosesskode.json...');
  try {
    const url = 'Prosesskode.json?nocache=' + new Date().getTime(); 
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Nettverksfeil: ${response.status}`);
    
    svvHandbok = await response.json();
    setStatus('✅ Tilkoblet og Prosesskoder lastet inn.', 'ok');
  } catch (error) {
    setStatus('⚠️ Kunne ikke laste Prosesskode.json. Viser "Ukjent prosesskode".', 'warn');
    svvHandbok = { prosesskoder: {} };
  }
}

$('scanBtn').addEventListener('click', async () => {
  if (!API) return;
  $('scanBtn').disabled = true;
  $('mainContent').innerHTML = '';
  
  try {
    setStatus('⏳ Henter modeller fra vieweren...');
    const models = await API.viewer.getObjects();
    
    if (!models || models.length === 0) {
      setStatus('⚠️ Fant ingen objekter i vieweren.', 'warn');
      $('scanBtn').disabled = false;
      return;
    }

    let prosessRegister = {};
    const CHUNK = 200;
    let totalObjects = 0;

    for (const model of models) {
      const mid = model.modelId || model.modelid;
      const objectIds = (model.objects || []).map(o => o.id || o.objectRuntimeId).filter(id => id != null);
      totalObjects += objectIds.length;
      
      for (let i = 0; i < objectIds.length; i += CHUNK) {
        const chunk = objectIds.slice(i, i + CHUNK);
        setStatus(`⏳ Analyserer egenskaper... (${i} av ${objectIds.length} i aktiv modell)`);
        
        const propsArr = await API.viewer.getObjectProperties(mid, chunk);
        
        propsArr.forEach(obj => {
          const flatProps = {};
          (obj.properties || []).forEach(pset => 
            (pset.properties || []).forEach(p => flatProps[p.name] = p.value)
          );
          
          const prosesskode = flatProps["Prosesskode"];
          
          let objektNavn = flatProps["Objekttype"];
          if (!objektNavn || objektNavn.trim() === "") {
            objektNavn = (obj.name && obj.name.trim() !== "") ? obj.name : "Ukjent objekt";
          }

          let mengdeVerdi = flatProps["Mengde"] || flatProps["Volume"] || flatProps["NetVolume"] || flatProps["Area"] || flatProps["NetArea"] || flatProps["Length"] || "0";
          mengdeVerdi = mengdeVerdi.toString().replace(',', '.');
          const mengde = parseFloat(mengdeVerdi) || 0; 
          
          if (prosesskode && prosesskode.trim() !== "") {
            if (!prosessRegister[prosesskode]) {
              const handbokData = (svvHandbok && svvHandbok.prosesskoder) ? svvHandbok.prosesskoder[prosesskode] : null;

              prosessRegister[prosesskode] = {
                tittel: handbokData && handbokData.tittel ? handbokData.tittel : "Ukjent prosesskode",
                enhet: handbokData && handbokData.enhet ? handbokData.enhet : "?",
                url: handbokData && handbokData.url ? handbokData.url : null,
                tekst: handbokData && handbokData.tekst ? handbokData.tekst : null,
                totalMengde: 0,
                objekterForMarkering: [], 
                objekter: []
              };
            }
            
            const runtimeId = obj.id || obj.objectRuntimeId;
            prosessRegister[prosesskode].totalMengde += mengde;
            prosessRegister[prosesskode].objekterForMarkering.push({ modelId: mid, objectRuntimeIds: [runtimeId] });
            prosessRegister[prosesskode].objekter.push({ navn: objektNavn, mengde: mengde, modelId: mid, runtimeId: runtimeId });
          }
        });
      }
    }

    tegnOppUI(prosessRegister);
    setStatus(`✅ Skanning fullført. Analyserte ${totalObjects} objekter.`, 'ok');
    $('scanBtn').disabled = false;

  } catch (error) {
    setStatus(`❌ Feil under skanning: ${error.message}`, 'error');
    $('scanBtn').disabled = false;
  }
});

function tegnOppUI(register) {
  const container = $('mainContent');
  const koder = Object.keys(register).sort();
  
  if (koder.length === 0) {
    container.innerHTML = '<div class="empty anim">Fant ingen objekter med egenskapen "Prosesskode".</div>';
    return;
  }

  const wrapper = document.createElement('div');
  wrapper.className = 'anim';

  koder.forEach(kode => {
    const data = register[kode];
    
    const div = document.createElement('div');
    div.className = 'prosess-panel';
    
    const header = document.createElement('div');
    header.className = 'prosess-header';
    
    const tittelDiv = document.createElement('div');
    tittelDiv.className = 'prosess-tittel';
    tittelDiv.innerText = `${kode} - ${data.tittel}`;

    if (data.url) {
      const lenke = document.createElement('a');
      lenke.href = data.url;
      lenke.target = '_blank';
      lenke.innerText = ' ↗ Håndbok';
      lenke.style.cssText = 'font-size:10px; color:var(--muted); margin-left:12px; text-decoration:none; font-family:var(--mono);';
      lenke.onmouseover = () => lenke.style.color = 'var(--blue)';
      lenke.onmouseout = () => lenke.style.color = 'var(--muted)';
      lenke.onclick = (e) => e.stopPropagation();
      tittelDiv.appendChild(lenke);
    }
    
    const mengdeDiv = document.createElement('div');
    mengdeDiv.className = 'prosess-mengde';
    mengdeDiv.innerText = `${data.totalMengde.toFixed(2)} ${data.enhet} (${data.objekter.length})`;
    
    header.appendChild(tittelDiv);
    header.appendChild(mengdeDiv);
    
    const kropp = document.createElement('div');
    kropp.className = 'panel-kropp';
    kropp.style.display = 'none';

    // 1. Legger inn tekst-beskrivelsen låst på toppen av panelet
    if (data.tekst) {
      const tekstDiv = document.createElement('div');
      tekstDiv.className = 'prosess-beskrivelse';
      
      ['a', 'b', 'c', 'd', 'e', 'x'].forEach(bokstav => {
        if (data.tekst[bokstav]) {
          const blokk = document.createElement('div');
          blokk.className = 'tekst-blokk';
          blokk.innerHTML = `<span class="tekst-bokstav">${tekstKoder[bokstav]}</span> ${data.tekst[bokstav]}`;
          tekstDiv.appendChild(blokk);
        }
      });
      
      if (tekstDiv.hasChildNodes()) {
          kropp.appendChild(tekstDiv);
      }
    }
    
    // 2. Bygger "Delmengder"-seksjonen med overskrift
    const delmengderSeksjon = document.createElement('div');
    delmengderSeksjon.className = 'delmengder-seksjon';
    
    const delmengderTittel = document.createElement('div');
    delmengderTittel.className = 'delmengder-tittel';
    delmengderTittel.innerText = 'Delmengder';
    delmengderSeksjon.appendChild(delmengderTittel);

    // 3. Setter selve objektlisten inn under overskriften
    const liste = document.createElement('div');
    liste.className = 'objekt-liste';
    
    data.objekter.forEach(obj => {
      const rad = document.createElement('div');
      rad.className = 'objekt-rad';
      rad.innerHTML = `<span class="obj-navn" title="${obj.navn}">${obj.navn}</span> <span class="obj-mengde">${obj.mengde.toFixed(2)} ${data.enhet}</span>`;
      
      rad.onclick = async (e) => {
        e.stopPropagation();
        try {
          if (API.viewer.setSelection) {
            await API.viewer.setSelection({ modelObjectIds: [{ modelId: obj.modelId, objectRuntimeIds: [Number(obj.runtimeId)] }] }, 'set');
          }
        } catch(err) {}
      };

      liste.appendChild(rad);
    });

    delmengderSeksjon.appendChild(liste);
    kropp.appendChild(delmengderSeksjon);

    header.onclick = async () => {
      const isOpen = kropp.style.display === 'flex';
      kropp.style.display = isOpen ? 'none' : 'flex';
      
      try {
        if (API.viewer.setSelection) {
          await API.viewer.setSelection({ modelObjectIds: data.objekterForMarkering }, 'set');
        }
      } catch(e) {}
    };

    div.appendChild(header);
    div.appendChild(kropp);
    wrapper.appendChild(div);
  });

  container.appendChild(wrapper);
}

connect();
</script>
</body>
</html>
