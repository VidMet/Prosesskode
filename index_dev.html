<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8"/>
  <title>Mengdeuttak R761</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg:        #f3f4f6;
      --surface:   #ffffff;
      --surface2:  #e5e7eb;
      --border:    #d1d5db;
      --ink:       #111827;
      --muted:     #6b7280;

      --green:     #166534;
      --green-dim: #dcfce7;
      --yellow:    #854d0e;
      --red:       #b91c1c;
      --red-dim:   #fee2e2;

      --blue:      #1d4ed8;
      --blue-dim:  #dbeafe;

      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 380px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .header-title { flex: 1; min-width: 200px; }

    .header-title h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title h1 .version {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: normal;
      color: var(--muted);
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .header-title p {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn:not(:disabled):hover {
      opacity: .85;
    }

    .btn:not(:disabled):active {
      transform: scale(.97);
    }

    .btn-primary {
      background: var(--blue);
      color: #ffffff;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--ink);
      border: 1px solid var(--border);
      margin-left: 4px;
    }

    .btn-secondary:not(:disabled):hover {
      background: var(--border);
    }

    #filterBar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 150px;
    }

    .filter-group label {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      white-space: nowrap;
    }

    .filter-group select {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .filter-group select:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #statusBar {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 16px;
      background: var(--blue-dim);
      color: var(--blue);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #statusBar.ok {
      background: var(--green-dim);
      color: var(--green);
    }

    #statusBar.error {
      background: var(--red-dim);
      color: var(--red);
    }

    #statusBar.warn {
      background: #fef08a;
      color: var(--yellow);
    }

    main {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px;
      height: 0;
    }

    .hoved-panel {
      margin-bottom: 16px;
    }

    .hoved-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: background 0.2s;
    }

    .hoved-header:hover {
      background: var(--surface2);
    }

    .hoved-tittel {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
    }

    .hoved-info {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .hoved-kropp {
      display: none;
      padding-top: 12px;
      padding-left: 12px;
      border-left: 2px solid var(--border);
      margin-left: 8px;
      flex-direction: column;
    }

    .prosess-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .prosess-panel:last-child {
      margin-bottom: 0;
    }

    .prosess-header {
      padding: 10px 14px;
      background: var(--surface);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
      user-select: none;
    }

    .prosess-header:hover {
      background: var(--surface2);
    }

    .prosess-tittel {
      font-weight: 600;
      font-size: 13px;
      color: var(--blue);
    }

    .prosess-mengde {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .panel-kropp {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-direction: column;
    }

    .prosess-beskrivelse {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      max-height: 180px;
      overflow-y: auto;
    }

    .tekst-blokk {
      margin-bottom: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--ink);
      border-left: 3px solid var(--surface2);
      padding-left: 10px;
    }

    .tekst-blokk:last-child {
      margin-bottom: 0;
    }

    .tekst-blokk p {
      margin-top: 4px;
      margin-bottom: 8px;
    }

    .tekst-blokk p:last-child {
      margin-bottom: 0;
    }

    .tekst-bokstav {
      font-weight: 700;
      color: var(--blue);
      display: block;
      margin-bottom: 2px;
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .delmengder-seksjon {
      display: flex;
      flex-direction: column;
      padding-top: 12px;
      background: var(--bg);
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .delmengder-tittel {
      font-weight: 700;
      color: var(--blue);
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 16px 8px 16px;
    }

    .objekt-liste {
      overflow-y: auto;
      max-height: 300px;
      border-top: 1px solid var(--border);
    }

    .modell-gruppe {
      display: flex;
      flex-direction: column;
    }

    .modell-overskrift {
      background: var(--surface);
      padding: 8px 16px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      position: sticky;
      top: 0;
      user-select: none;
      z-index: 2;
    }

    .modell-overskrift:hover {
      background: var(--surface2);
      color: var(--ink);
    }

    .modell-overskrift-mengde {
      color: var(--blue);
      font-weight: 600;
    }

    .modell-objekter {
      display: none;
      flex-direction: column;
    }

    .objekt-rad {
      display: flex;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      background: var(--surface);
    }

    .objekt-rad:hover {
      background: var(--bg);
    }

    .obj-navn {
      font-size: 12px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
      padding-left: 20px;
      border-left: 2px solid var(--border);
    }

    .obj-mengde {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
    }

    .obj-mengde-feil {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--red);
      font-weight: 700;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ink);
    }

    @keyframes fadeUp {
      from {
        opacity:0;
        transform:translateY(6px);
      }
      to {
        opacity:1;
        transform:none;
      }
    }

    .anim {
      animation: fadeUp .3s ease both;
    }
  </style>
</head>

<body>

<header>
  <div class="header-title">
    <h1>Mengdeuttak R761 <span class="version">v1.02</span></h1>
    <p>Interaktivt oppslag mot SVV Prosesskoder</p>
  </div>

  <span class="badge" id="modelBadge">Frakoblet</span>

  <button class="btn btn-primary" id="scanBtn" disabled>
    ▶ Skann Modell
  </button>

  <button class="btn btn-secondary" id="exportBtn" disabled>
    📊 Eksporter til Excel
  </button>
</header>

<div id="filterBar">
  <div class="filter-group">
    <label for="versionFilter">Håndbok:</label>

    <select id="versionFilter" disabled>
      <option value="2025">R761 (2025)</option>
      <option value="2018">R761 (2018)</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="modelFilter">Utvalg:</label>

    <select id="modelFilter" disabled>
      <option value="ALL">Alle modeller i vieweren</option>
    </select>
  </div>
</div>

<div id="statusBar">Kobler til Trimble Connect...</div>

<main id="mainContent">
  <div class="empty anim">
    Trykk <strong>Skann Modell</strong> for å hente ut mengder.
  </div>
</main>

<script>

let API = null;
let svvHandbok = null;

let globalProsessRegister = {};
let globalModelsMap = {};

const hovedprosessNavn = {
  "1": "Forberedende tiltak og generelle kostnader",
  "2": "Sprengning og masseflytting",
  "3": "Tunneler",
  "4": "Grøfter, kummer og rør",
  "5": "Vegfundament",
  "6": "Vegdekke",
  "7": "Vegutstyr og miljøtiltak",
  "8": "Bruer og kaier",
  "9": "Drift og vedlikehold",
  "X": "Ingen prosesskode funnet"
};

const tekstKoder = {
  "a": "a) Omfang",
  "b": "b) Materialer",
  "c": "c) Utførelse",
  "d": "d) Toleranser",
  "e": "e) Prøving, kontroll",
  "x": "x) Mengderegler"
};

const $ = id => document.getElementById(id);

const setStatus = (m, c='') => {
  $('statusBar').textContent = m;
  $('statusBar').className = c;
};

const lastPathPart = (v) =>
  (v || '').split('/').pop().split('\\').pop();

async function connect() {

  try {

    API = await window.TrimbleConnectWorkspace.connect(window.parent);

    await lastJSONFil($('versionFilter').value);

    $('scanBtn').disabled = false;
    $('versionFilter').disabled = false;

    $('modelBadge').textContent = 'Tilkoblet';

  } catch(e) {

    setStatus('❌ Kunne ikke koble til API.', 'error');

  }
}

async function lastJSONFil(versjon) {

  setStatus(`⏳ Laster inn R761 (${versjon})...`);

  try {

    const kapitler = ['1','2','3','4','5','6','7','8','9'];

    const cacheBuster = new Date().getTime();

    const promises = kapitler.map(kap =>

      fetch(`Prosesskode_${versjon}_${kap}.json?nocache=${cacheBuster}`)
        .then(res => {

          if (!res.ok) {
            throw new Error(`Status ${res.status}`);
          }

          return res.json();

        })
        .catch(err => {

          console.warn(`Hoppet over kapittel ${kap} for ${versjon}`);

          return null;

        })
    );

    const resultater = await Promise.all(promises);

    svvHandbok = { prosesskoder: {} };

    let totaltLastedeKoder = 0;

    resultater.forEach(data => {

      if (data && data.prosesskoder) {

        Object.assign(svvHandbok.prosesskoder, data.prosesskoder);

        totaltLastedeKoder +=
          Object.keys(data.prosesskoder).length;
      }
    });

    if (totaltLastedeKoder === 0) {
      throw new Error(`Fant ingen filer for versjon ${versjon}.`);
    }

    setStatus(
      `✅ Lastet inn ${totaltLastedeKoder} koder for R761 (${versjon}).`,
      'ok'
    );

  } catch(error) {

    console.error("Databasefeil:", error);

    setStatus(
      `⚠️ Feil ved lasting av ${versjon}: ${error.message}`,
      'warn'
    );

    svvHandbok = { prosesskoder: {} };
  }
}

const handbokData =
    hasProsesskode &&
    svvHandbok &&
    svvHandbok.prosesskoder
        ? svvHandbok.prosesskoder[prosesskode]
        : null;

const hpKode =
    hasProsesskode
        ? (prosesskode.includes('.')
            ? prosesskode.split('.')[0][0]
            : prosesskode[0])
        : "X";

/* =========================
   EGENDEFINERTE KODER
   ========================= */

const prosessNavnRaw =
    flatProps["Prosessnavn"] ??
    flatProps["prosessnavn"] ??
    flatProps["ProsessNavn"];

const egendefinertProsessNavn =
    prosessNavnRaw &&
    String(prosessNavnRaw).trim() !== ""
        ? `${String(prosessNavnRaw).trim()} (egendefinert)`
        : "Ukjent prosesskode";

const enhetRaw =
    flatProps["Enhet"] ??
    flatProps["enhet"];

const egendefinertEnhet =
    enhetRaw &&
    String(enhetRaw).trim() !== ""
        ? String(enhetRaw).trim()
        : "?";

const erEgendefinertKode =
    hasProsesskode &&
    !handbokData;

/* =========================
   ENHET
   ========================= */

let enhet = "?";

if (hasProsesskode) {

    if (handbokData && handbokData.enhet) {

        enhet = handbokData.enhet.toLowerCase();

    } else if (erEgendefinertKode) {

        enhet = egendefinertEnhet.toLowerCase();

    }

} else {

    enhet = "stk";

}

/* ===========================
   NY LOGIKK FOR EGENDEFINERTE
   PROSESSKODER
   =========================== */

const handbokData =
    hasProsesskode &&
    svvHandbok &&
    svvHandbok.prosesskoder
        ? svvHandbok.prosesskoder[prosesskode]
        : null;

const prosessNavnRaw =
    flatProps["Prosessnavn"] ??
    flatProps["prosessnavn"] ??
    flatProps["ProsessNavn"];

const egendefinertProsessNavn =
    prosessNavnRaw &&
    String(prosessNavnRaw).trim() !== ""
        ? `${String(prosessNavnRaw).trim()} (egendefinert)`
        : "Ukjent prosesskode";

const enhetRaw =
    flatProps["Enhet"] ??
    flatProps["enhet"];

const egendefinertEnhet =
    enhetRaw &&
    String(enhetRaw).trim() !== ""
        ? String(enhetRaw).trim()
        : "?";

const erEgendefinertKode =
    hasProsesskode &&
    (!handbokData);

globalProsessRegister[prosesskode] = {

    tittel:
        handbokData && handbokData.tittel
            ? handbokData.tittel
            : egendefinertProsessNavn,

    enhet:
        handbokData && handbokData.enhet
            ? handbokData.enhet
            : egendefinertEnhet,

    hovedprosess: hpKode,

    url:
        handbokData && handbokData.url
            ? handbokData.url
            : null,

    tekst:
        handbokData && handbokData.tekst
            ? handbokData.tekst
            : null,

    egendefinert: erEgendefinertKode,

    objekter: []

};

</script>
